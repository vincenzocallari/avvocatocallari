<head>

  <title>Studio Legale Callari | Avvocato a Cefalù</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #0e1117;
      --ink-2:  #3a3f4a;
      --ink-3:  #7a8190;
      --gold:   #9e7c3f;
      --gold-l: #f5ede0;
      --line:   #e4e7ed;
      --bg:     #ffffff;
      --bg-off: #f8f8f6;
      --max:    1100px;
      --ease:   cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .wrap {
      width: min(var(--max), 100% - 48px);
      margin-inline: auto;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp .7s var(--ease) both; }
    .delay-1 { animation-delay: .1s; }
    .delay-2 { animation-delay: .22s; }
    .delay-3 { animation-delay: .34s; }
    .delay-4 { animation-delay: .46s; }

    header {
      position: sticky; top: 0; z-index: 90;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
      gap: 32px;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      letter-spacing: .01em;
      color: var(--ink);
      white-space: nowrap;
    }
    .brand em { color: var(--gold); font-style: normal; }

    .nav-links {
      display: flex; gap: 8px;
      list-style: none;
    }
    .nav-links a {
      padding: 8px 18px;
      border-radius: 4px;
      font-size: .875rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--ink-2);
      transition: color .2s var(--ease), background .2s var(--ease);
    }
    .nav-links a:hover { color: var(--ink); background: var(--bg-off); }

    .nav-cta {
      padding: 10px 22px;
      border-radius: 4px;
      background: var(--ink);
      color: #fff !important;
      font-size: .875rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      transition: background .2s var(--ease) !important;
      white-space: nowrap;
    }
    .nav-cta:hover { background: var(--gold) !important; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 28px;
      border-radius: 4px;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
